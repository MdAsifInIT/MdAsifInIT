<svg width="1200" height="360" viewBox="0 0 1200 360" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">Md Asif space profile banner</title>
  <desc id="desc">Animated starfield banner with a mission-control display, orbit traces, and a small spacecraft accent.</desc>
  <style>
    .star { animation: twinkle 2.8s ease-in-out infinite; transform-origin: center; }
    .star:nth-of-type(2n) { animation-delay: .7s; }
    .star:nth-of-type(3n) { animation-delay: 1.4s; }
    .float { animation: float 5s ease-in-out infinite; }
    .float-small { animation: floatSmall 4.2s ease-in-out infinite; }
    .pulse { animation: pulse 3s ease-in-out infinite; }
    .dash { animation: drift 16s linear infinite; }
    .scan { animation: scan 3.8s ease-in-out infinite; }
    .orbit { animation: orbitPulse 5.5s ease-in-out infinite; }
    .comet { animation: comet 7s linear infinite; }
    .meter-a { animation: meterA 2.8s ease-in-out infinite; }
    .meter-b { animation: meterB 3.2s ease-in-out infinite; }
    .meter-c { animation: meterC 2.6s ease-in-out infinite; }
    @keyframes twinkle { 0%, 100% { opacity: .28; transform: scale(.8); } 50% { opacity: 1; transform: scale(1.15); } }
    @keyframes float { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-10px); } }
    @keyframes floatSmall { 0%, 100% { transform: translate(0, 0); } 50% { transform: translate(-12px, -8px); } }
    @keyframes pulse { 0%, 100% { opacity: .65; } 50% { opacity: 1; } }
    @keyframes drift { from { stroke-dashoffset: 0; } to { stroke-dashoffset: -180; } }
    @keyframes scan { 0%, 100% { transform: translateX(-210px); opacity: 0; } 18%, 70% { opacity: .42; } 50% { transform: translateX(590px); } }
    @keyframes orbitPulse { 0%, 100% { opacity: .16; transform: scale(.96); } 50% { opacity: .42; transform: scale(1.02); } }
    @keyframes comet { 0% { transform: translate(-170px, -70px); opacity: 0; } 12%, 58% { opacity: .9; } 100% { transform: translate(1320px, 210px); opacity: 0; } }
    @keyframes meterA { 0%, 100% { width: 146px; } 50% { width: 96px; } }
    @keyframes meterB { 0%, 100% { width: 104px; } 50% { width: 142px; } }
    @keyframes meterC { 0%, 100% { width: 128px; } 50% { width: 86px; } }
  </style>
  <defs>
    <linearGradient id="space" x1="0" y1="0" x2="1200" y2="360" gradientUnits="userSpaceOnUse">
      <stop stop-color="#080D1F"/>
      <stop offset=".48" stop-color="#101820"/>
      <stop offset="1" stop-color="#1B2444"/>
    </linearGradient>
    <radialGradient id="planet" cx="0" cy="0" r="1" gradientUnits="userSpaceOnUse" gradientTransform="translate(1035 66) rotate(133) scale(230)">
      <stop stop-color="#31C4B3"/>
      <stop offset=".55" stop-color="#36558F"/>
      <stop offset="1" stop-color="#101820" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="visor" x1="170" y1="124" x2="326" y2="226" gradientUnits="userSpaceOnUse">
      <stop stop-color="#B9F8FF"/>
      <stop offset=".5" stop-color="#58A6FF"/>
      <stop offset="1" stop-color="#1F6FEB"/>
    </linearGradient>
  </defs>

  <rect width="1200" height="360" rx="34" fill="url(#space)"/>
  <rect x="1.5" y="1.5" width="1197" height="357" rx="32.5" stroke="#31C4B3" stroke-opacity=".34" stroke-width="3"/>
  <circle cx="1035" cy="66" r="236" fill="url(#planet)" opacity=".72"/>
  <circle class="orbit" cx="1035" cy="66" r="142" fill="none" stroke="#31C4B3" stroke-width="2" stroke-dasharray="10 18">
    <animate attributeName="opacity" values=".16;.42;.16" dur="5.5s" repeatCount="indefinite"/>
    <animate attributeName="r" values="136;146;136" dur="5.5s" repeatCount="indefinite"/>
  </circle>
  <circle class="orbit" cx="1035" cy="66" r="188" fill="none" stroke="#F6C85F" stroke-width="2" stroke-dasharray="4 22">
    <animate attributeName="opacity" values=".14;.38;.14" dur="6.4s" repeatCount="indefinite"/>
    <animate attributeName="r" values="180;194;180" dur="6.4s" repeatCount="indefinite"/>
  </circle>
  <circle cx="970" cy="292" r="144" fill="#FF6F61" opacity=".1"/>
  <circle cx="206" cy="282" r="180" fill="#31C4B3" opacity=".08"/>
  <g class="comet" transform="translate(-170 -70)">
    <animateTransform attributeName="transform" type="translate" values="-170 -70;1320 210" dur="7s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0;.9;.9;0" keyTimes="0;.12;.58;1" dur="7s" repeatCount="indefinite"/>
    <path d="M0 0H118" stroke="#F6C85F" stroke-width="5" stroke-linecap="round" opacity=".72"/>
    <circle cx="126" cy="0" r="7" fill="#FFFFFF"/>
  </g>

  <g class="star" fill="#FFFFFF">
    <circle cx="91" cy="70" r="2.4"><animate attributeName="opacity" values=".28;1;.28" dur="2.8s" repeatCount="indefinite"/></circle><circle cx="184" cy="45" r="1.8"><animate attributeName="opacity" values=".28;1;.28" dur="3.1s" begin=".7s" repeatCount="indefinite"/></circle><circle cx="303" cy="78" r="2.2"><animate attributeName="opacity" values=".28;1;.28" dur="2.6s" begin="1.4s" repeatCount="indefinite"/></circle>
    <circle cx="458" cy="45" r="1.7"><animate attributeName="opacity" values=".28;1;.28" dur="3s" begin=".3s" repeatCount="indefinite"/></circle><circle cx="596" cy="77" r="2.1"><animate attributeName="opacity" values=".28;1;.28" dur="2.7s" begin="1s" repeatCount="indefinite"/></circle><circle cx="718" cy="42" r="1.8"><animate attributeName="opacity" values=".28;1;.28" dur="3.2s" begin="1.6s" repeatCount="indefinite"/></circle>
    <circle cx="846" cy="87" r="2.4"><animate attributeName="opacity" values=".28;1;.28" dur="2.9s" begin=".5s" repeatCount="indefinite"/></circle><circle cx="1086" cy="168" r="1.8"><animate attributeName="opacity" values=".28;1;.28" dur="3.3s" begin="1.2s" repeatCount="indefinite"/></circle><circle cx="1110" cy="289" r="2.4"><animate attributeName="opacity" values=".28;1;.28" dur="2.5s" begin=".8s" repeatCount="indefinite"/></circle>
    <circle cx="681" cy="295" r="1.9"><animate attributeName="opacity" values=".28;1;.28" dur="3s" begin="1.5s" repeatCount="indefinite"/></circle><circle cx="392" cy="307" r="1.9"><animate attributeName="opacity" values=".28;1;.28" dur="2.6s" begin=".4s" repeatCount="indefinite"/></circle><circle cx="73" cy="239" r="2.1"><animate attributeName="opacity" values=".28;1;.28" dur="3.4s" begin="1.1s" repeatCount="indefinite"/></circle>
  </g>

  <path class="dash" d="M84 312C222 338 346 304 482 325C640 349 760 310 910 324C1022 334 1100 310 1148 292" stroke="#F6C85F" stroke-width="3" stroke-linecap="round" stroke-dasharray="12 22" opacity=".55">
    <animate attributeName="stroke-dashoffset" values="0;-180" dur="16s" repeatCount="indefinite"/>
  </path>

  <g class="float">
    <animateTransform attributeName="transform" type="translate" values="0 0;0 -10;0 0" dur="5s" repeatCount="indefinite"/>
    <rect x="104" y="94" width="322" height="194" rx="48" fill="#0D1327" stroke="#31C4B3" stroke-opacity=".55" stroke-width="3"/>
    <rect x="133" y="122" width="137" height="84" rx="42" fill="#101820"/>
    <rect x="145" y="134" width="113" height="60" rx="30" fill="url(#visor)"/>
    <path d="M302 128H386" stroke="#FF6F61" stroke-width="17" stroke-linecap="round"/>
    <path d="M302 171H357" stroke="#F6C85F" stroke-width="17" stroke-linecap="round"/>
    <path d="M302 214H396" stroke="#31C4B3" stroke-width="17" stroke-linecap="round"/>
    <circle cx="151" cy="246" r="10" fill="#FF6F61"/>
    <circle cx="186" cy="246" r="10" fill="#F6C85F"/>
    <circle cx="221" cy="246" r="10" fill="#31C4B3"/>
    <path d="M122 303H408" stroke="#31C4B3" stroke-width="4" stroke-linecap="round" stroke-dasharray="16 18" opacity=".62"/>
  </g>

  <g class="pulse">
    <animate attributeName="opacity" values=".76;1;.76" dur="3s" repeatCount="indefinite"/>
    <rect x="521" y="82" width="544" height="196" rx="28" fill="#0D1327" stroke="#31C4B3" stroke-opacity=".46" stroke-width="2"/>
    <rect class="scan" x="540" y="91" width="82" height="178" rx="20" fill="#31C4B3" opacity=".18">
      <animate attributeName="x" values="540;1130;540" dur="3.8s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0;.42;.18;0" keyTimes="0;.18;.7;1" dur="3.8s" repeatCount="indefinite"/>
    </rect>
    <text x="558" y="139" fill="#31C4B3" font-family="Consolas, 'Courier New', monospace" font-size="22" font-weight="700">AI AUTOMATION ENGINEER</text>
    <text x="558" y="198" fill="#FFFFFF" font-family="Arial, Helvetica, sans-serif" font-size="58" font-weight="800">Md Asif</text>
    <text x="560" y="243" fill="#D9E7FF" font-family="Arial, Helvetica, sans-serif" font-size="24" font-weight="600">workflow automation + scalable apps</text>
    <rect class="meter-a" x="868" y="114" width="146" height="18" rx="9" fill="#FF6F61">
      <animate attributeName="width" values="146;96;146" dur="2.8s" repeatCount="indefinite"/>
    </rect>
    <rect class="meter-b" x="868" y="151" width="104" height="18" rx="9" fill="#F6C85F">
      <animate attributeName="width" values="104;142;104" dur="3.2s" repeatCount="indefinite"/>
    </rect>
    <rect class="meter-c" x="868" y="188" width="128" height="18" rx="9" fill="#31C4B3">
      <animate attributeName="width" values="128;86;128" dur="2.6s" repeatCount="indefinite"/>
    </rect>
  </g>

  <g transform="translate(1006 248) rotate(12)">
    <g class="float-small">
      <animateTransform attributeName="transform" type="translate" values="0 0;-12 -8;0 0" dur="4.2s" repeatCount="indefinite"/>
      <path d="M0 46L52 10L134 54L54 94Z" fill="#F6C85F"/>
      <path d="M38 33L78 54L39 74L0 52Z" fill="#101820" opacity=".34"/>
      <circle cx="88" cy="52" r="12" fill="#B9F8FF"/>
      <path d="M-18 52H-72" stroke="#F6C85F" stroke-width="5" stroke-linecap="round" opacity=".58"/>
    </g>
  </g>
</svg>
