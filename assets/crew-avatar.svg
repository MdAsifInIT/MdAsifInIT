<svg width="420" height="420" viewBox="0 0 420 420" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">Original space crew avatar</title>
  <desc id="desc">A small original astronaut avatar floating in a starry circle.</desc>
  <style>
    .bob { animation: bob 4s ease-in-out infinite; }
    .spark { animation: spark 2.4s ease-in-out infinite; }
    .spark:nth-of-type(2n) { animation-delay: .6s; }
    @keyframes bob { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-9px); } }
    @keyframes spark { 0%, 100% { opacity: .25; transform: scale(.75); } 50% { opacity: 1; transform: scale(1.2); } }
  </style>
  <defs>
    <radialGradient id="bg" cx="0" cy="0" r="1" gradientUnits="userSpaceOnUse" gradientTransform="translate(210 210) rotate(90) scale(210)">
      <stop stop-color="#1B2444"/>
      <stop offset="1" stop-color="#080D1F"/>
    </radialGradient>
    <linearGradient id="visor" x1="145" y1="138" x2="277" y2="216" gradientUnits="userSpaceOnUse">
      <stop stop-color="#C9FBFF"/>
      <stop offset=".52" stop-color="#58A6FF"/>
      <stop offset="1" stop-color="#1F6FEB"/>
    </linearGradient>
    <clipPath id="avatarClip">
      <circle cx="210" cy="210" r="205"/>
    </clipPath>
  </defs>
  <circle cx="210" cy="210" r="205" fill="url(#bg)" stroke="#31C4B3" stroke-width="4"/>
  <g clip-path="url(#avatarClip)">
    <g class="spark" fill="#FFFFFF">
      <circle cx="74" cy="111" r="4"/><circle cx="116" cy="303" r="3"/><circle cx="307" cy="83" r="3.5"/>
      <circle cx="348" cy="267" r="4"/><circle cx="238" cy="342" r="3"/><circle cx="62" cy="220" r="2.8"/>
    </g>
    <path d="M56 332C126 290 183 312 232 286C293 254 331 274 383 238V420H56V332Z" fill="#31C4B3" opacity=".14"/>
    <g class="bob">
      <path d="M103 178C103 106 153 64 223 64H246C315 64 365 110 365 181V245C365 316 315 356 246 356H223C153 356 103 315 103 244V178Z" fill="#FF6F61"/>
      <path d="M130 178C130 125 167 93 220 93H244C298 93 337 128 337 183V240C337 293 299 326 245 326H220C167 326 130 293 130 240V178Z" fill="#D85249"/>
      <rect x="156" y="132" width="156" height="86" rx="43" fill="#101820"/>
      <rect x="169" y="144" width="128" height="61" rx="30.5" fill="url(#visor)"/>
      <path d="M285 237H355C378 237 397 256 397 279V317H285V237Z" fill="#C44540"/>
      <path d="M285 255H349C362 255 372 265 372 278V290H285V255Z" fill="#101820" opacity=".28"/>
      <path d="M169 358H242V390H169V358Z" fill="#8F3638"/>
      <path d="M152 257C172 294 210 316 257 316" stroke="#FFFFFF" stroke-width="14" stroke-linecap="round" opacity=".18"/>
      <circle cx="128" cy="139" r="18" fill="#F6C85F"/>
      <path d="M120 125L102 101" stroke="#F6C85F" stroke-width="8" stroke-linecap="round"/>
    </g>
  </g>
</svg>
